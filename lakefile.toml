name = "trocq"
defaultTargets = ["Trocq"]
testDriver = "test"

# A Lean-native reformulation of Trocq (modular parametricity / proof transfer).
# Self-contained — no external dependencies (only the Lean core `Lean` library).
#
#   lake build   — build the library (Trocq/)
#   lake test    — run the test suite (Tests/) ; fails on any regression

[[lean_lib]]
name = "Trocq"

# `Examples/` — worked examples of USING the library (e.g. registering the `Nat ≃ Unary` base).
# Not part of the library; the tests import it to exercise the driver against a real registered base.
[[lean_lib]]
name = "Examples"
globs = ["Examples.*"]

[[lean_lib]]
name = "Tests"
globs = ["Tests.*"]

[[lean_exe]]
name = "test"
root = "Tests"
