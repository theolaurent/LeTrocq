name = "letrocq"
defaultTargets = ["LeTrocq"]
testDriver = "test"

# Treat every Lean warning (linter hits, deprecations, …) as a hard error, for ALL targets — so a plain
# `lake build` / `lake test` fails locally exactly as it does in CI.
leanOptions = [{ name = "warningAsError", value = true }]

# A Lean-native reformulation of LeTrocq (modular parametricity / proof transfer).
# The LIBRARY itself has no external dependencies (only the Lean core `Lean` library). The single
# `require` below is DOC-TOOLING ONLY — `checkdecls` is a separate executable the docs CI runs
# (`lake exe checkdecls`) to verify every `\lean{…}` in the blueprint names a real declaration. It
# is not imported by `LeTrocq.*`, the examples, or the tests, so it never enters a generated proof.
#
#   lake build   — build the library (LeTrocq/)
#   lake test    — run the test suite (Tests/) ; fails on any regression

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "LeTrocq"

# `Examples/` — worked examples of USING the library (e.g. registering the `Nat ≃ Unary` base).
# Not part of the library; the tests import it to exercise the driver against a real registered base.
[[lean_lib]]
name = "Examples"
globs = ["Examples.*"]

[[lean_lib]]
name = "Tests"
globs = ["Tests.*"]

[[lean_exe]]
name = "test"
root = "Tests"
