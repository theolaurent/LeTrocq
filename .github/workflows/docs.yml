name: Documentation

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

# Let the deploy step publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  book:
    name: Build & deploy the mdBook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to the version mdbook-katex 0.9.4 is built against.
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.48'

      # The KaTeX preprocessor renders every formula at BUILD TIME, so a malformed
      # formula fails this step (rust/cargo are preinstalled on the runner).
      - name: Install mdbook-katex
        run: cargo install mdbook-katex --version 0.9.4 --locked

      - name: Build the book
        run: mdbook build   # → ./book/

      # Enable GitHub Pages (build_type = workflow) if it isn't already, so the deploy
      # below has a Pages site to publish to.
      - name: Enable GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Deploy gated to main; other branches and PRs only validate that the book builds.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
