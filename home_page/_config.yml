# Jekyll settings for the LeTrocq landing page.
# Self-contained: no remote_theme / no plugins (the Cayman look ships as a static compiled
# stylesheet in assets/css/style.css), so `jekyll build` needs only core Jekyll and can't fail
# on sass compilation, a remote-theme fetch, or github-metadata.
title: LeTrocq
description: A Lean implementation of the Trocq proof-transfer framework

# The site is served at <domain>/LeTrocq/ (a project page), so baseurl is /LeTrocq and every
# internal link uses `| relative_url` to pick it up. url is the canonical custom domain.
url: "http://theolaurent.github.io"
baseurl: "/LeTrocq"
