<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#157878">
  <title>{{ page.title | default: site.title | default: 'LeTrocq' }}</title>
  <!-- Static Cayman theme stylesheet (it @imports the Open Sans font itself). relative_url
       prepends the /LeTrocq baseurl so the path is correct on the project page. -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>
  <a id="skip-to-content" href="#content">Skip to the content.</a>

  <header class="page-header" role="banner">
    <h1 class="project-name">{{ site.title | default: 'LeTrocq' }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <a href="{{ '/blueprint' | relative_url }}" class="btn">Blueprint (web)</a>
    <a href="{{ '/blueprint.pdf' | relative_url }}" class="btn">Blueprint (pdf)</a>
    <!-- API docs disabled (api-docs: false in docs.yml); re-enable there to restore this button.
    <a href="{{ '/docs' | relative_url }}" class="btn">Documentation</a>
    -->
    <a href="https://github.com/theolaurent/LeTrocq" class="btn">GitHub</a>
  </header>

  <main id="content" class="main-content" role="main">
    {{ content }}

    <footer class="site-footer">
      <span class="site-footer-owner"><a href="https://github.com/theolaurent/LeTrocq">LeTrocq</a>
        is maintained by Théo Laurent.</span>
    </footer>
  </main>
</body>

</html>
