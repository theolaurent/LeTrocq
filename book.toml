[book]
title = "LeTrocq"
description = "A Lean implementation of the Trocq proof-transfer framework."
authors = ["Théo Laurent"]
language = "en"
src = "docs"

[build]
build-dir = ".book"

[output.html]
# served as a github project page at <user>.github.io/LeTrocq/, so absolute links and
# the generated 404 page must carry the /LeTrocq/ prefix.
site-url = "/LeTrocq/"
git-repository-url = "https://github.com/theolaurent/LeTrocq"

[output.html.fold]
enable = true
level = 1

# math is rendered at build time by the `mdbook-katex` preprocessor
[preprocessor.katex]
macros = "docs/texmacros.txt"

[preprocessor.bib]
bibliography = "refs.bib"
render-bib = "all"    # for now show all entries from the bibliography file
